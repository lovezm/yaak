name: Build And Overwrite Fork Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: autobuild
  RELEASE_NAME: Auto Build

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runs_on: macos-latest
            rust_target: aarch64-apple-darwin
            yaak_arch: arm64
            bundle: dmg
            artifact_name: yaak-macos-arm64
            artifact_path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows x64
            runs_on: windows-latest
            rust_target: x86_64-pc-windows-msvc
            yaak_arch: x64
            bundle: nsis
            artifact_name: yaak-windows-x64
            artifact_path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-fork
          cache-on-failure: true

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: vp install

      - name: Bootstrap
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: ${{ matrix.yaak_arch }}

      - name: Set build version
        run: npm run replace-version
        env:
          YAAK_VERSION: 0.0.${{ github.run_number }}

      - name: Build bundle
        run: npx tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle }} --config ./crates-tauri/yaak-app/tauri.conf.json
        env:
          YAAK_TARGET_ARCH: ${{ matrix.yaak_arch }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish overwrite release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Move fixed tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$RELEASE_TAG" -m "Auto build $GITHUB_SHA" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create or update release shell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=$'自动覆盖的最新构建产物。\n\n分支: '"$GITHUB_REF_NAME"$'\n提交: '"$GITHUB_SHA"$'\n触发: '"$GITHUB_WORKFLOW"$'\n时间(UTC): '"$(date -u '+%Y-%m-%d %H:%M:%S')" 
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "$notes" --prerelease
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "$notes" --prerelease
          fi

      - name: Remove old assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$assets" ]; then
            exit 0
          fi

          while IFS= read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset "$RELEASE_TAG" "$asset" --yes
            fi
          done <<< "$assets"

      - name: Upload new assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
